server:
  port: ${PORT:8080}

discord:
  token: ${DISCORD_TOKEN}
  guild-id: ${DISCORD_GUILD_ID:}
  allowed-role-ids: ${DISCORD_ALLOWED_ROLE_IDS:}
  allowed-guild-ids: ${DISCORD_ALLOWED_GUILD_IDS:}
  role-message-channel-id: ${DISCORD_ROLE_MESSAGE_CHANNEL_ID:}
  mythic-roster-channel-id: ${DISCORD_MYTHIC_ROSTER_CHANNEL_ID:}
  role-assignments:
    - emoji: "💀"
      role-id: "1479103112806666384"
      label: "Mythic"
      mythic: true
    - emoji: "🔥"
      role-id: "1479103237989859410"
      label: "Heroic"
      mythic: false

raidhelper:
  api-key: ${RAIDHELPER_API_KEY}
  server-id: ${RAIDHELPER_SERVER_ID}
  wednesday-channel-id: ${RAIDHELPER_WEDNESDAY_CHANNEL_ID}
  sunday-channel-id: ${RAIDHELPER_SUNDAY_CHANNEL_ID}
  leader-id: ${RAIDHELPER_LEADER_ID}
  template-id: ${RAIDHELPER_TEMPLATE_ID}

features:
  commands: ${FEATURES_COMMANDS:true}
  auto-create-events: ${FEATURES_AUTO_CREATE_EVENTS:true}
  reaction-roles: ${FEATURES_REACTION_ROLES:true}

